<section id="autoevaluacion">
  <div class="lesson-container">
    <h3>AUTOEVALUACIÓN</h3>
    <hr>

    <div class="instructions-box">
      <ul>
        <li>Sólo hay una respuesta correcta por pregunta.</li>
        <li>Haz clic en la respuesta que consideres correcta.</li>
        <li>Contesta todas las preguntas y haz clic en <strong>Corregir</strong>.</li>
        <li>Pulsa <strong>Restablecer</strong> para reiniciar.</li>
      </ul>
    </div>

    <div id="quiz-form"></div>

    <div class="button-container">
      <button id="submit-btn">Corregir</button>
      <button id="reset-btn" class="reset-button">Restablecer</button>
    </div>

    <div id="result-container" class="result-box" style="display: none;">
      <h2>CALIFICACIÓN</h2>
      <p id="result-text"></p>
      <p id="result-message"></p>
    </div>
  </div>
</section>
