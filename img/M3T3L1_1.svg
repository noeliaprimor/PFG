<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Modelo de micro-batches en Spark Streaming</title>
  <desc id="desc">Diagrama que muestra un flujo continuo dividido en intervalos temporales, donde cada intervalo genera un RDD procesado por Spark Streaming.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263238"/>
    </marker>
    <style>
      .title{font:700 30px Arial,sans-serif;fill:#17212b}
      .label{font:700 18px Arial,sans-serif;fill:#17212b}
      .small{font:15px Arial,sans-serif;fill:#37474f}
      .box{fill:#f8fbff;stroke:#2f6fed;stroke-width:2.5;rx:14}
      .rdd{fill:#fff7e5;stroke:#f2a516;stroke-width:2.5;rx:12}
      .spark{fill:#f3ecff;stroke:#7555b8;stroke-width:2.5;rx:14}
      .sink{fill:#eaf8f4;stroke:#24a284;stroke-width:2.5;rx:14}
      .line{stroke:#263238;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="520" fill="#ffffff"/>
  <text x="600" y="44" text-anchor="middle" class="title">Spark Streaming clasico: flujo continuo dividido en micro-batches</text>

  <rect x="50" y="115" width="210" height="130" class="box"/>
  <text x="155" y="153" text-anchor="middle" class="label">Fuente continua</text>
  <text x="155" y="184" text-anchor="middle" class="small">logs, socket, Kafka</text>
  <text x="155" y="210" text-anchor="middle" class="small">eventos entrantes</text>

  <path d="M275 180 H350" class="line"/>

  <rect x="365" y="90" width="145" height="80" class="rdd"/>
  <text x="437" y="125" text-anchor="middle" class="label">RDD 1</text>
  <text x="437" y="150" text-anchor="middle" class="small">0-5 s</text>
  <rect x="365" y="210" width="145" height="80" class="rdd"/>
  <text x="437" y="245" text-anchor="middle" class="label">RDD 2</text>
  <text x="437" y="270" text-anchor="middle" class="small">5-10 s</text>
  <rect x="365" y="330" width="145" height="80" class="rdd"/>
  <text x="437" y="365" text-anchor="middle" class="label">RDD 3</text>
  <text x="437" y="390" text-anchor="middle" class="small">10-15 s</text>

  <path d="M525 250 H610" class="line"/>

  <rect x="625" y="140" width="220" height="210" class="spark"/>
  <text x="735" y="178" text-anchor="middle" class="label">DStream</text>
  <text x="735" y="210" text-anchor="middle" class="small">secuencia de RDDs</text>
  <text x="735" y="240" text-anchor="middle" class="small">map, filter, reduce</text>
  <text x="735" y="270" text-anchor="middle" class="small">window, estado</text>
  <text x="735" y="305" text-anchor="middle" class="small">jobs periodicos</text>

  <path d="M860 245 H940" class="line"/>

  <rect x="955" y="115" width="195" height="130" class="sink"/>
  <text x="1052" y="153" text-anchor="middle" class="label">Salida</text>
  <text x="1052" y="184" text-anchor="middle" class="small">ficheros, BD</text>
  <text x="1052" y="210" text-anchor="middle" class="small">dashboards</text>

  <rect x="955" y="300" width="195" height="95" fill="#fff4f2" stroke="#e85d4f" stroke-width="2.5" rx="14"/>
  <text x="1052" y="336" text-anchor="middle" class="label">Checkpoint</text>
  <text x="1052" y="365" text-anchor="middle" class="small">estado y recuperacion</text>
</svg>
