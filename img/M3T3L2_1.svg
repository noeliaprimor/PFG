<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Integracion de Spark Structured Streaming con Kafka</title>
  <desc id="desc">Diagrama de lectura desde Kafka, parseo con esquema, procesamiento por ventanas y escritura en sinks.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263238"/>
    </marker>
    <style>
      .title{font:700 30px Arial,sans-serif;fill:#17212b}
      .label{font:700 18px Arial,sans-serif;fill:#17212b}
      .small{font:15px Arial,sans-serif;fill:#37474f}
      .kafka{fill:#f7f7f7;stroke:#222;stroke-width:2.5;rx:14}
      .spark{fill:#f3ecff;stroke:#7555b8;stroke-width:2.5;rx:14}
      .process{fill:#eaf3ff;stroke:#2f6fed;stroke-width:2.5;rx:14}
      .sink{fill:#eaf8f4;stroke:#24a284;stroke-width:2.5;rx:14}
      .checkpoint{fill:#fff4f2;stroke:#e85d4f;stroke-width:2.5;rx:14}
      .line{stroke:#263238;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="520" fill="#ffffff"/>
  <text x="600" y="44" text-anchor="middle" class="title">Patron Spark Structured Streaming + Kafka</text>

  <rect x="45" y="140" width="205" height="165" class="kafka"/>
  <text x="148" y="178" text-anchor="middle" class="label">Kafka topic</text>
  <text x="148" y="210" text-anchor="middle" class="small">particiones</text>
  <text x="148" y="236" text-anchor="middle" class="small">offsets</text>
  <text x="148" y="262" text-anchor="middle" class="small">key / value</text>

  <path d="M265 222 H335" class="line"/>

  <rect x="350" y="120" width="205" height="205" class="spark"/>
  <text x="452" y="158" text-anchor="middle" class="label">readStream</text>
  <text x="452" y="190" text-anchor="middle" class="small">format("kafka")</text>
  <text x="452" y="216" text-anchor="middle" class="small">startingOffsets</text>
  <text x="452" y="242" text-anchor="middle" class="small">maxOffsetsPerTrigger</text>
  <text x="452" y="280" text-anchor="middle" class="small">key/value binarios</text>

  <path d="M570 222 H640" class="line"/>

  <rect x="655" y="120" width="220" height="205" class="process"/>
  <text x="765" y="158" text-anchor="middle" class="label">Procesamiento</text>
  <text x="765" y="190" text-anchor="middle" class="small">CAST + from_json</text>
  <text x="765" y="216" text-anchor="middle" class="small">schema explicito</text>
  <text x="765" y="242" text-anchor="middle" class="small">watermark + window</text>
  <text x="765" y="280" text-anchor="middle" class="small">validacion y metricas</text>

  <path d="M890 222 H960" class="line"/>

  <rect x="975" y="90" width="180" height="105" class="sink"/>
  <text x="1065" y="128" text-anchor="middle" class="label">Sink analitico</text>
  <text x="1065" y="160" text-anchor="middle" class="small">Parquet / Delta</text>
  <rect x="975" y="240" width="180" height="105" class="sink"/>
  <text x="1065" y="278" text-anchor="middle" class="label">Sink eventos</text>
  <text x="1065" y="310" text-anchor="middle" class="small">Kafka output topic</text>

  <rect x="430" y="380" width="340" height="80" class="checkpoint"/>
  <text x="600" y="414" text-anchor="middle" class="label">Checkpoint persistente</text>
  <text x="600" y="442" text-anchor="middle" class="small">offsets procesados, estado y recuperacion ante fallos</text>
</svg>
