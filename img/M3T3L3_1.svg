<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="540" viewBox="0 0 1200 540" role="img" aria-labelledby="title desc">
  <title id="title">Casos practicos de streaming con Spark</title>
  <desc id="desc">Diagrama con tres casos: clickstream, alertas de fraude y pipeline Bronze-Silver con foreachBatch.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#263238"/>
    </marker>
    <style>
      .title{font:700 30px Arial,sans-serif;fill:#17212b}
      .label{font:700 18px Arial,sans-serif;fill:#17212b}
      .small{font:15px Arial,sans-serif;fill:#37474f}
      .source{fill:#f7f7f7;stroke:#222;stroke-width:2.5;rx:14}
      .case1{fill:#eaf3ff;stroke:#2f6fed;stroke-width:2.5;rx:14}
      .case2{fill:#fff4f2;stroke:#e85d4f;stroke-width:2.5;rx:14}
      .case3{fill:#eaf8f4;stroke:#24a284;stroke-width:2.5;rx:14}
      .sink{fill:#fff7e5;stroke:#f2a516;stroke-width:2.5;rx:14}
      .line{stroke:#263238;stroke-width:4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect width="1200" height="540" fill="#ffffff"/>
  <text x="600" y="44" text-anchor="middle" class="title">Casos practicos con Spark Structured Streaming</text>

  <rect x="55" y="195" width="170" height="130" class="source"/>
  <text x="140" y="235" text-anchor="middle" class="label">Eventos</text>
  <text x="140" y="268" text-anchor="middle" class="small">Kafka / ficheros</text>
  <text x="140" y="294" text-anchor="middle" class="small">JSON Lines</text>

  <path d="M240 260 H315" class="line"/>

  <rect x="330" y="80" width="255" height="120" class="case1"/>
  <text x="458" y="116" text-anchor="middle" class="label">Clickstream</text>
  <text x="458" y="148" text-anchor="middle" class="small">usuarios activos</text>
  <text x="458" y="174" text-anchor="middle" class="small">URLs por ventana</text>

  <rect x="330" y="220" width="255" height="120" class="case2"/>
  <text x="458" y="256" text-anchor="middle" class="label">Alertas fraude</text>
  <text x="458" y="288" text-anchor="middle" class="small">picos por tarjeta</text>
  <text x="458" y="314" text-anchor="middle" class="small">ventanas deslizantes</text>

  <rect x="330" y="360" width="255" height="120" class="case3"/>
  <text x="458" y="396" text-anchor="middle" class="label">Bronze a Silver</text>
  <text x="458" y="428" text-anchor="middle" class="small">validacion</text>
  <text x="458" y="454" text-anchor="middle" class="small">foreachBatch</text>

  <path d="M600 140 H690" class="line"/>
  <path d="M600 280 H690" class="line"/>
  <path d="M600 420 H690" class="line"/>

  <rect x="705" y="80" width="220" height="120" class="sink"/>
  <text x="815" y="116" text-anchor="middle" class="label">Metricas</text>
  <text x="815" y="148" text-anchor="middle" class="small">Parquet / dashboard</text>
  <text x="815" y="174" text-anchor="middle" class="small">latencia y throughput</text>

  <rect x="705" y="220" width="220" height="120" class="sink"/>
  <text x="815" y="256" text-anchor="middle" class="label">Alertas</text>
  <text x="815" y="288" text-anchor="middle" class="small">Parquet / Kafka</text>
  <text x="815" y="314" text-anchor="middle" class="small">auditoria</text>

  <rect x="705" y="360" width="220" height="120" class="sink"/>
  <text x="815" y="396" text-anchor="middle" class="label">Data Lake</text>
  <text x="815" y="428" text-anchor="middle" class="small">raw, silver</text>
  <text x="815" y="454" text-anchor="middle" class="small">cuarentena</text>

  <rect x="980" y="195" width="165" height="130" fill="#f3ecff" stroke="#7555b8" stroke-width="2.5" rx="14"/>
  <text x="1062" y="235" text-anchor="middle" class="label">Control</text>
  <text x="1062" y="268" text-anchor="middle" class="small">checkpoint</text>
  <text x="1062" y="294" text-anchor="middle" class="small">watermark</text>
</svg>
